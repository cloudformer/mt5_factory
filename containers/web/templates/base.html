<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>MT5 Factory</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <span class="brand">MT5 Factory</span>
  {% set ep = request.endpoint or '' %}
  <a href="{{ url_for('dashboard.index') }}" {% if ep.startswith('dashboard.') %}class="active"{% endif %}>概览</a>
  <a href="{{ url_for('workers.index') }}" {% if ep.startswith('workers.') %}class="active"{% endif %}>Workers</a>
  <a href="{{ url_for('datasync.index') }}" {% if ep.startswith('datasync.') %}class="active"{% endif %}>下载</a>
  <a href="{{ url_for('strategies.index') }}" {% if ep.startswith('strategies.') %}class="active"{% endif %}>策略</a>
  <a href="{{ url_for('backtests.index') }}" {% if ep.startswith('backtests.') %}class="active"{% endif %}>回测</a>
  <a href="{{ url_for('execution.demo') }}" {% if ep == 'execution.demo' %}class="active"{% endif %}>Demo</a>
  <a href="{{ url_for('execution.live') }}" {% if ep == 'execution.live' %}class="active"{% endif %}>实盘</a>
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
