<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>MT5 Factory</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <span class="brand">MT5 Factory</span>
  <a href="{{ url_for('dashboard.index') }}">概览</a>
  <a href="{{ url_for('workers.index') }}">Workers</a>
  <a href="{{ url_for('datasync.index') }}">下载</a>
  <a href="{{ url_for('strategies.index') }}">策略</a>
  <a href="{{ url_for('backtests.index') }}">回测</a>
  <a href="{{ url_for('execution.demo') }}">Demo</a>
  <a href="{{ url_for('execution.live') }}">实盘</a>
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
