{% extends "base.html" %}
{% import "_macros.html" as m %}
{% block content %}
{{ m.page_header('配置 · AI 生成器', '外部 AI 服务地址（可选）；策略生成页的 AI 模式会调它的 /propose') }}

<section>
  <h2>AI 生成器 (可选)</h2>
  <form method="post" action="{{ url_for('symbols.save_ai') }}" class="inline">
    <label>地址 <input name="ai_generator_url" value="{{ ai_url }}" size="32" placeholder="http://host:9000 (空=不用)"></label>
    <button class="small">保存</button>
    <span class="muted">策略生成页的 AI 模式调它的 /propose; 留空则该模式不可用, 生成走 random/grid 不受影响</span>
  </form>
</section>
{% endblock %}
