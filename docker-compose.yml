# MT5 Factory - Docker Compose
# 运行在 Linux VM（或 Mac 本地开发）: app + pgsql
# Windows VM 上的 MT5 worker 见 windows_mt5/，通过 mt5_hosts 表注册进系统

services:
  # ========== PostgreSQL（所有数据的唯一真实来源） ==========
  postgres:
    image: postgres:16-alpine
    container_name: mt5_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - ./containers/postgres/data:/var/lib/postgresql/data   # 数据在 repo 内 (gitignore)
      # 不挂 initdb 脚本: schema 由 api 启动时自动执行 containers/postgres/schema/ (唯一机制)
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
    networks:
      - mt5_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ========== API（业务服务，按需再拆） ==========
  api:
    build:
      context: .
      dockerfile: containers/api/Dockerfile
    container_name: mt5_api
    restart: unless-stopped
    environment:
      ENV_NAME: ${ENV_NAME}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-}
      MT5_HOSTS: ${MT5_HOSTS:-}
      MT5_PORT: ${MT5_PORT:-8020}
    ports:
      - "${API_PORT}:8010"
    volumes:
      - ./containers/api/src:/app/src:ro       # 开发热更新 (uvicorn --reload)
      - ./strategy_core:/app/strategy_core:ro
      - ./containers/postgres/schema:/app/schema:ro   # schema 唯一来源, api 启动自动执行
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mt5_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ========== Web 前端 (Flask, 只调 api) ==========
  web:
    build:
      context: ./containers/web
      dockerfile: Dockerfile
    container_name: mt5_web
    restart: unless-stopped
    environment:
      API_URL: http://api:8010   # 内部接线: 服务名+内部端口, 与本文件的 api 服务定义同源
      SECRET_KEY: ${SECRET_KEY:-mt5web}
    ports:
      - "${WEB_PORT}:8000"
    volumes:
      - ./containers/web:/app:ro   # 开发热更新 (gunicorn --reload)
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mt5_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mt5_network:
    driver: bridge
