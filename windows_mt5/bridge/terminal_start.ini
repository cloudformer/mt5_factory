; MT5 terminal start config - bridge launches terminal64.exe with /config:<this file>.
; Purpose: bake terminal-level switches into config so a cloned/reinstalled worker
; is trade-ready without clicking buttons in the terminal UI.
; NOTE: applies only when the terminal is launched BY BRIDGE; a terminal opened
; manually by double-click keeps its own saved settings.
; Keep comments in English: MT5 may read this file with a non-UTF8 codepage.

[Experts]
; master switch for algo trading (= the "Algo Trading" toolbar button).
; runner order_send is rejected with retcode 10027 when this is off.
AllowLiveTrading=1
Enabled=1
; we never use DLLs - keep disabled for safety
AllowDllImport=0
